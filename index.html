<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site de Notícias</title>
    <link rel="stylesheet" href="./assets/css/login/estilo.css">
    <script src="./assets/js/login.js" type="module"></script>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">S</div>
            <h1 class="titulo">Meu site de Notícias</h1>
        </header>
        <div class="overlay">
            <section class="modal">
                <h1>Login</h1>
                <form>
                    <label>E-mail</label>
                    <input id="email" type="text" placeholder="Informe seu e-mail">
                    <label>Senha</label>
                    <input id="senha" type="password" placeholder="Informe sua senha">
                    <p class="esqueceu-container">
                        <a href="#" class="esqueceu">Esqueceu sua senha?</a>
                    </p>
                    <button>Entrar</button>

                    <div class="divider">
                        <div class="divider-line"></div>
                        <span class="divider-text">ou</span>
                        <div class="divider-line"></div>
                    </div>
                    <p class="cadastro-link">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
                </form>
            </section>
        </div>
    </div>
    <footer>&copy; Meu Site de Notícias, 🐚🪼🐻‍❄️</footer>
</body>

</html>
